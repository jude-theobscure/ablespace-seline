═══════════════════════════════════════════════
SCROLL REVEAL
═══════════════════════════════════════════════

All nodes and center: initially opacity 0, scale 0.6
Lines: initially opacity 0
Bubbles: initially opacity 0, translateY 15px

On IntersectionObserver (threshold 0.3):
Add class .visible to section

.visible center node:
  opacity: 1, scale: 1
  transition: 600ms cubic-bezier(0.34,1.56,0.64,1)
  delay: 0ms

.visible team nodes:
  opacity: 1, scale: 1
  transition: 500ms cubic-bezier(0.34,1.56,0.64,1)
  Stagger delays: 100ms, 200ms, 300ms, 400ms, 500ms

.visible lines SVG:
  opacity: 1
  transition: 800ms ease
  delay: 300ms

.visible bubbles:
  opacity: 1, translateY: 0
  transition: 400ms ease
  Stagger: 150ms each, starting delay 600ms

