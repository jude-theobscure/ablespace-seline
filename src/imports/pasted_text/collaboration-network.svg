Replace the Secure Collaboration section completely.
Design inspired by Slack's network graph (attached).
Style: cute, kawaii, soft, organic — NOT corporate.
NO headline, NO subtext, NO stats, NO label pill.

═══════════════════════════════════════════════
SECTION WRAPPER
═══════════════════════════════════════════════

Background: #F8F8F5
Padding: 60px 80px 80px
Position: relative
Overflow: hidden

═══════════════════════════════════════════════
LAYOUT — FULL WIDTH ORGANIC NETWORK
═══════════════════════════════════════════════

One div, position: relative
Width: 100%, height: 520px
Max-width: 1000px, margin: 0 auto

═══════════════════════════════════════════════
CONNECTING LINES (SVG background layer)
═══════════════════════════════════════════════

SVG: position absolute, top 0, left 0, 
     width 100%, height 100%
     pointer-events: none, overflow: visible

All lines are CURVED dashed paths — 
NOT straight lines. Use quadratic bezier curves.
Each curve bows gently upward or sideways.

stroke: rgba(0,0,0,0.10)
stroke-width: 1.5
stroke-dasharray: 6 5
fill: none
stroke-linecap: round

Lines connect from EACH team member 
TO the student center (530, 280):

Teacher    (160, 400) → (530, 280)  curve via (280, 200)
Parapro    (280, 120) → (530, 280)  curve via (350, 160)
Therapist  (530, 80)  → (530, 280)  curve via (480, 160)
Admin      (760, 120) → (530, 280)  curve via (700, 200)
Parent     (860, 360) → (530, 280)  curve via (740, 200)

MARCHING ANIMATION on all lines:
@keyframes march {
  to { stroke-dashoffset: -22; }
}
All lines: animation: march 1.8s linear infinite
Delays: 0s, 0.36s, 0.72s, 1.08s, 1.44s

TRAVELING GLOW DOT on each curve:
  <circle r="4.5">
  fill: #53AEF3
  opacity: 0.7
  Use <animateMotion> with calcMode="spline"
  dur: "2.2s", repeatCount: "indefinite"
  path: same bezier as connecting line
  Begin offsets: 0s, 0.44s, 0.88s, 1.32s, 1.76s

